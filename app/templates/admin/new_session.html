{% extends "base.html" %}
{% block title %}New Session — Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <h2 class="mb-4">Create New Session</h2>
    <div class="card">
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Fleet</label>
            <select name="fleet_id" class="form-select" required>
              <option value="">— Select fleet —</option>
              {% for fleet in fleets %}
              <option value="{{ fleet.id }}">{{ fleet.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" required>
          </div>
          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label">Start Time <span class="text-muted">(optional)</span></label>
              <input type="time" name="start_time" class="form-control">
            </div>
            <div class="col">
              <label class="form-label">End Time <span class="text-muted">(optional)</span></label>
              <input type="time" name="end_time" class="form-control">
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label">Commitment Deadline</label>
              <div class="input-group">
                <input type="number" name="commitment_deadline_days" class="form-control"
                       value="14" min="1" max="90" required>
                <span class="input-group-text">days before</span>
              </div>
            </div>
            <div class="col">
              <label class="form-label">Min Sailors to Confirm</label>
              <input type="number" name="min_sailors" class="form-control" value="5" min="1" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes <span class="text-muted">(optional)</span></label>
            <textarea name="notes" class="form-control" rows="3"
                      placeholder="Location, special instructions, etc."></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create Session</button>
            <a href="{{ url_for('admin.sessions') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
