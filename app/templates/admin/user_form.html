{% extends "base.html" %}
{% block title %}{{ 'Edit' if action == 'edit' else 'New' }} Account — Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{{ url_for('admin.users') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h2 class="mb-0">{{ 'Edit Account' if action == 'edit' else 'New Account' }}</h2>
    </div>

    <div class="card">
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control" required
                     value="{{ user.first_name if user is defined else '' }}">
            </div>
            <div class="col">
              <label class="form-label">Last Name</label>
              <input type="text" name="last_name" class="form-control" required
                     value="{{ user.last_name if user is defined else '' }}">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required
                   value="{{ user.email if user is defined else '' }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Audit Number</label>
            <input type="text" name="audit_number" class="form-control"
                   value="{{ user.audit_number if user is defined and user.audit_number else '' }}">
          </div>

          <div class="mb-3">
            <label class="form-label">
              Password
              {% if action == 'edit' %}
                <span class="text-muted fw-normal small">(leave blank to keep current)</span>
              {% endif %}
            </label>
            <input type="password" name="password" class="form-control"
                   {{ 'required' if action == 'new' else '' }}
                   autocomplete="new-password">
          </div>

          <div class="mb-4">
            <label class="form-label d-block">Role</label>
            <div class="d-flex gap-4">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="is_admin" value="0"
                       id="role_parent"
                       {{ 'checked' if action == 'new' or (user is defined and not user.is_admin) }}>
                <label class="form-check-label" for="role_parent">
                  <span class="badge bg-secondary">Parent</span>
                  <span class="text-muted small ms-1">Can register sailors &amp; sign up for sessions</span>
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="is_admin" value="1"
                       id="role_admin"
                       {{ 'checked' if user is defined and user.is_admin }}>
                <label class="form-check-label" for="role_admin">
                  <span class="badge bg-danger">Admin</span>
                  <span class="text-muted small ms-1">Full access to manage sessions, users, and settings</span>
                </label>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              {{ 'Save Changes' if action == 'edit' else 'Create Account' }}
            </button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
