{% extends "base.html" %}
{% block title %}Settings — Admin{% endblock %}

{% block content %}
<h2 class="mb-4">App Settings</h2>

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header fw-bold">Registration Settings</div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" role="switch"
                     name="fleet_lock" id="fleet_lock"
                     {{ 'checked' if fleet_lock }}>
              <label class="form-check-label fw-semibold" for="fleet_lock">
                Fleet Lock
              </label>
            </div>
            <div class="text-muted small mt-1">
              When enabled, a sailor can only be registered under one fleet.
              Parents will be blocked from adding the same child to multiple fleets.
              Default: <strong>off</strong>.
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
