{% extends "base.html" %}
{% block title %}Log In — LYC Jr Sailing{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header fw-bold">Log In</div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-baseline">
              <label class="form-label mb-0">Password</label>
              <a href="{{ url_for('auth.forgot_password') }}" class="small text-muted">Forgot password?</a>
            </div>
            <input type="password" name="password" class="form-control mt-1" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Log In</button>
        </form>
      </div>
      <div class="card-footer text-center text-muted">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
