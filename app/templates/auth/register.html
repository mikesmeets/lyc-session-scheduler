{% extends "base.html" %}
{% block title %}Register — LYC Jr Sailing{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header fw-bold">Create an Account</div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control" required autofocus>
            </div>
            <div class="col">
              <label class="form-label">Last Name</label>
              <input type="text" name="last_name" class="form-control" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Audit Number</label>
            <input type="text" name="audit_number" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Create Account</button>
        </form>
      </div>
      <div class="card-footer text-center text-muted">
        Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
